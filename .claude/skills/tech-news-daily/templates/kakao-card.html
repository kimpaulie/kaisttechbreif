<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Daily Tech Brief Card</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --kaist-blue: #1f4899;
    --kaist-blue-deep: #15326b;
    --ink: #0a0a14;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    background: var(--kaist-blue);
    color: #fff;
    font-family: 'Pretendard', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    padding: 70px 70px 60px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  body::before {
    content: "";
    position: absolute;
    right: -200px;
    top: -200px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* --- 헤더: 큰 로고 + 큰 브랜드명 (한 줄) --- */
  .brand {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 44px;
  }
  .brand-logo {
    height: 96px;
    width: auto;
    flex-shrink: 0;
    background: #fff;
    padding: 12px 18px;
    border-radius: 12px;
  }
  .brand-name {
    font-size: 42px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.025em;
    line-height: 1;
    white-space: nowrap;
  }

  /* --- 제호 + 큰 날짜 --- */
  .masthead {
    margin-bottom: 36px;
    padding-bottom: 36px;
    border-bottom: 1px solid rgba(255,255,255,0.22);
  }
  .masthead-title {
    font-size: 64px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.035em;
    color: #fff;
    margin-bottom: 22px;
  }
  .masthead-date {
    font-family: 'Inter', 'Pretendard', sans-serif;
    font-size: 56px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.025em;
    line-height: 1;
  }
  .masthead-date .dow {
    margin-left: 16px;
    color: rgba(255,255,255,0.7);
    font-weight: 700;
  }

  /* --- 키워드 클라우드 (어두운 박스로 분리) --- */
  .keyword-cloud {
    background: var(--kaist-blue-deep);
    border-radius: 18px;
    padding: 30px 34px;
    margin-bottom: 36px;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 14px 22px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .keyword-cloud .kw {
    font-weight: 700;
    letter-spacing: -0.015em;
    line-height: 1.05;
  }
  /* 크기: order 순서로 5단계 */
  .kw.size-1 { font-size: 22px; opacity: 0.6; font-weight: 600; }
  .kw.size-2 { font-size: 28px; opacity: 0.78; }
  .kw.size-3 { font-size: 36px; opacity: 0.9; }
  .kw.size-4 { font-size: 44px; opacity: 1; }
  .kw.size-5 { font-size: 52px; opacity: 1; font-weight: 800; }
  /* 색조: 같은 카드 그룹 안에서는 같은 색, 옆 카드와는 살짝 다른 색 (5색 순환) */
  .kw[data-order="1"], .kw[data-order="6"]  { color: #ffffff; }
  .kw[data-order="2"], .kw[data-order="7"]  { color: #fef9e0; }  /* warm white */
  .kw[data-order="3"], .kw[data-order="8"]  { color: #d8ecff; }  /* cool sky */
  .kw[data-order="4"], .kw[data-order="9"]  { color: #ecd9ff; }  /* lavender */
  .kw[data-order="5"], .kw[data-order="10"] { color: #ffd9e3; }  /* soft pink */

  /* --- 헤드라인 리스트 (키워드 박스와 같은 좌측 라인) --- */
  .headlines {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .headline {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 22px;
    align-items: baseline;
  }
  .headline-num {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 32px;
    color: rgba(255,255,255,0.55);
    letter-spacing: -0.02em;
    line-height: 1;
    text-align: center;
  }
  .headline-text {
    font-size: 32px;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.02em;
    color: rgba(255,255,255,0.95);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* --- 우측 하단 큰 CTA --- */
  .cta {
    align-self: flex-end;
    margin-top: 40px;
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: #fff;
    color: var(--kaist-blue);
    padding: 22px 38px;
    border-radius: 14px;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.02em;
    box-shadow: 0 12px 32px rgba(0,0,0,0.18);
  }
  .cta .arrow {
    font-size: 34px;
    line-height: 1;
  }
</style>
</head>
<body>
  <div class="brand">
    <img class="brand-logo" id="brandLogo" alt="KCB" />
    <div class="brand-name">KAIST 경영대학 테크 네트워크</div>
  </div>

  <div class="masthead">
    <div class="masthead-title">데일리 테크 브리프</div>
    <div class="masthead-date" id="dateLine">— <span class="dow"></span></div>
  </div>

  <div class="keyword-cloud" id="keywordCloud"></div>

  <div class="headlines" id="headlinesList"></div>

  <div class="cta">전체 보기 <span class="arrow">→</span></div>

<script>
  function render(ed, logoDataUrl) {
    if (logoDataUrl) document.getElementById('brandLogo').src = logoDataUrl;

    const dateStr = ed.id.replaceAll('-', '.');
    document.getElementById('dateLine').innerHTML =
      `${dateStr} <span class="dow">${ed.dayOfWeek}요일</span>`;

    // 키워드 클라우드: 카드 1번부터 10번 순서대로, 같은 카드의 키워드는 인접 배치
    // 사이즈: order 1~2 = size-5, 3~4 = size-4, 5~6 = size-3, 7~8 = size-2, 9~10 = size-1
    const cloud = document.getElementById('keywordCloud');
    ed.newsItems.forEach(it => {
      let size;
      if (it.order <= 2) size = 5;
      else if (it.order <= 4) size = 4;
      else if (it.order <= 6) size = 3;
      else if (it.order <= 8) size = 2;
      else size = 1;
      (it.keywords || []).forEach(k => {
        const span = document.createElement('span');
        span.className = 'kw size-' + size;
        span.dataset.order = it.order;
        span.textContent = k;
        cloud.appendChild(span);
      });
    });

    // 헤드라인
    const list = document.getElementById('headlinesList');
    list.innerHTML = '';
    ed.newsItems.forEach(it => {
      const row = document.createElement('div');
      row.className = 'headline';
      row.innerHTML = `
        <span class="headline-num">${String(it.order).padStart(2, '0')}</span>
        <span class="headline-text">${escapeHtml(it.title)}</span>
      `;
      list.appendChild(row);
    });
  }
  function escapeHtml(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  window.renderEdition = render;
</script>
</body>
</html>
