<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Daily Tech Brief Card</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --kaist-blue: #1f4899;
    --kaist-blue-deep: #15326b;
    --ink: #0a0a14;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    background: var(--kaist-blue);
    color: #fff;
    font-family: 'Pretendard', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    padding: 90px 80px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  body::before {
    content: "";
    position: absolute;
    right: -200px;
    top: -200px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* --- 헤더 (브랜드) --- */
  .brand {
    display: flex;
    align-items: center;
    gap: 18px;
    padding-bottom: 28px;
    border-bottom: 1px solid rgba(255,255,255,0.25);
    margin-bottom: 44px;
  }
  .brand-logo {
    width: 56px;
    height: 56px;
    background: #fff;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: var(--kaist-blue);
    letter-spacing: -0.04em;
  }
  .brand-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.015em;
  }

  /* --- 제호 + 날짜 --- */
  .masthead {
    margin-bottom: 56px;
  }
  .masthead-title {
    font-size: 78px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.035em;
    color: #fff;
    margin-bottom: 22px;
  }
  .masthead-date {
    font-family: 'Inter', 'Pretendard', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: -0.015em;
    margin-bottom: 8px;
  }
  .masthead-date .vol {
    color: rgba(255,255,255,0.55);
    margin-left: 14px;
    font-weight: 500;
  }
  .masthead-coverage {
    font-size: 18px;
    font-weight: 500;
    color: rgba(255,255,255,0.70);
    letter-spacing: -0.005em;
  }
  .masthead-coverage::before {
    content: "다룬 기간 · ";
    color: rgba(255,255,255,0.50);
  }

  /* --- 헤드라인 리스트 --- */
  .headlines {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .headline {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 20px;
    align-items: baseline;
  }
  .headline-num {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 32px;
    color: rgba(255,255,255,0.55);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .headline-text {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.02em;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* --- 푸터 --- */
  .footer {
    margin-top: 50px;
    padding-top: 30px;
    border-top: 1px solid rgba(255,255,255,0.25);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-cta {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .footer-cta .arrow {
    margin-left: 8px;
    font-size: 26px;
  }
  .footer-url {
    font-family: 'Inter', monospace;
    font-size: 18px;
    font-weight: 500;
    color: rgba(255,255,255,0.70);
    letter-spacing: -0.005em;
  }
</style>
</head>
<body>
  <div class="brand">
    <div class="brand-logo">KCB</div>
    <div class="brand-name">KAIST 경영대학 테크 네트워크</div>
  </div>

  <div class="masthead">
    <div class="masthead-title">데일리 테크 브리프</div>
    <div class="masthead-date" id="dateLine">— <span class="vol">Vol.—</span></div>
    <div class="masthead-coverage" id="coverageLine" style="display:none;"></div>
  </div>

  <div class="headlines" id="headlinesList"></div>

  <div class="footer">
    <div class="footer-cta">전체 보기 <span class="arrow">→</span></div>
    <div class="footer-url" id="footerUrl">kimpaulie.github.io/kaisttechbreif/</div>
  </div>

<script>
  // 페이지가 file:// 또는 fetch 로딩될 때, location.search 또는 window._edition 에서 데이터 받음.
  // generate_message.py 가 page.evaluate 로 데이터를 주입한다.
  function render(ed) {
    const dateStr = ed.id.replaceAll('-', '.');
    document.getElementById('dateLine').innerHTML =
      `${dateStr} ${ed.dayOfWeek}요일 <span class="vol">Vol.${ed.volumeNumber}</span>`;

    const cov = document.getElementById('coverageLine');
    if (ed.coverage && ed.coverage.label) {
      cov.textContent = ed.coverage.label;
      cov.style.display = '';
    }

    const list = document.getElementById('headlinesList');
    list.innerHTML = '';
    ed.newsItems.forEach(it => {
      const row = document.createElement('div');
      row.className = 'headline';
      row.innerHTML = `
        <span class="headline-num">${String(it.order).padStart(2, '0')}</span>
        <span class="headline-text">${escapeHtml(it.title)}</span>
      `;
      list.appendChild(row);
    });

    if (ed.id) {
      document.getElementById('footerUrl').textContent =
        `kimpaulie.github.io/kaisttechbreif/#${ed.id}`;
    }
  }
  function escapeHtml(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  window.renderEdition = render;
</script>
</body>
</html>
